name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/docker-cpu.txt
          python -m pip install -e ".[dev]" --no-deps

      - name: Run tests
        run: python -m pytest

      - name: Run ruff
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Run mypy
        run: python -m mypy src

      - name: Run synthetic smoke benchmark
        run: |
          python scripts/train_synth.py --config configs/benchmark_smoke.yaml
          python scripts/validate_metrics.py outputs/benchmark_smoke/metrics.json --check-files
          python scripts/make_report.py outputs/benchmark_smoke/metrics.json
          python scripts/check_certificates.py outputs/benchmark_smoke/metrics.json
          test -f outputs/benchmark_smoke/config.yaml
          test -f outputs/benchmark_smoke/metrics.json
          test -f outputs/benchmark_smoke/report.md
